<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pete Steere | Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    
    <div class="container">
        <header>
            <h1>Pete Steere</h1>
            <p>Professional Portfolio & Personal Hub</p>
        </header>
        <nav class="links-grid">
            <a href="Portfolio/index.html" class="card portfolio-card">
                <h2>Portfolio</h2>
                <p>View my latest projects, case studies, and engineering work.</p>
                <div class="card-glow"></div>
            </a>
            <a href="AboutMe/index.html" class="card about-card">
                <h2>About Me</h2>
                <p>Learn more about my background, experience, and skills.</p>
                <div class="card-glow"></div>
            </a>
        </nav>
    </div>
    <div id="dev-nav-wrapper">
        <div id="dev-terminal" class="hidden">
            <div id="terminal-output">
                <div>DezOS Terminal v1.0</div>
                <div>Type 'help' to see available commands.</div>
            </div>
            <div id="terminal-input-line">
                <span class="prompt">pete@local:~$</span>
                <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
            </div>
        </div>
        <button id="dev-nav-toggle">_Dev Nav</button>
    </div>

    <script>
        const toggleBtn = document.getElementById('dev-nav-toggle');
        const terminal = document.getElementById('dev-terminal');
        const input = document.getElementById('terminal-input');
        const output = document.getElementById('terminal-output');

        toggleBtn.addEventListener('click', () => {
            terminal.classList.toggle('hidden');
            if(!terminal.classList.contains('hidden')) {
                input.focus();
            }
        });

        const printLine = (text) => {
            const div = document.createElement('div');
            div.innerHTML = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                printLine(`<span style="color: #fff">pete@local:~$</span> ${val}`);
                this.value = '';
                
                if (!val) return;

                const args = val.split(' ');
                const cmd = args[0].toLowerCase();

                if (cmd === 'help') {
                    printLine('Available commands:');
                    printLine('  &nbsp;&nbsp;help       - Show this message');
                    printLine('  &nbsp;&nbsp;/nav       - List navigation options');
                    printLine('  &nbsp;&nbsp;/nav [dst] - Navigate to [dst] (home, about, portfolio)');
                    printLine('  &nbsp;&nbsp;/whoami    - Display bio');
                    printLine('  &nbsp;&nbsp;clear      - Clear terminal');
                } else if (cmd === '/whoami') {
                    printLine('Pete Steere: Tech enthusiast, home automation tinkerer, and devoted family man. I experiment with local LLMs and build elegant solutions for modern problems.');
                } else if (cmd === '/nav') {
                    if (args.length === 1) {
                        printLine('Available destinations: home, about, portfolio');
                        printLine('Usage: /nav [destination]');
                    } else {
                        const dest = args[1].toLowerCase();
                        if (dest === 'home') window.location.href = 'index.html';
                        else if (dest === 'about') window.location.href = 'AboutMe/index.html';
                        else if (dest === 'portfolio') window.location.href = 'Portfolio/index.html';
                        else printLine(`Unknown destination: ${dest}`);
                    }
                } else if (cmd === 'clear') {
                    output.innerHTML = '';
                } else {
                    printLine(`Command not found: ${cmd}`);
                }
            }
        });
    </script>
</body>
</html>
